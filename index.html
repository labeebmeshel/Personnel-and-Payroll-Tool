<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>حاسبة ضريبة كسب العمل - PRAXI</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#eaf2ff,#f8fbff);padding:30px;color:#123}
.box{max-width:950px;margin:auto;background:#fff;padding:25px;border-radius:20px;box-shadow:0 15px 35px rgba(0,64,160,.15)}
.brand{text-align:center;margin-bottom:18px}
.brand img {max-width: 200px; height: auto; display: block; margin: 0 auto 10px auto; display: none;} 
.sub{color:#0b4fb3;font-weight:bold;margin-top:6px;font-size: 1.2em;}
.input-row { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; margin-bottom: 15px; gap: 10px; }
.or-text { font-weight: bold; color: #0b4fb3; font-size: 1.1em; }
input,button{padding:12px; border:1px solid #c9d8f0; border-radius:10px}
input{width: 250px;}
button{background:#0b4fb3;color:#fff;border:none;cursor:pointer; padding: 12px 20px;}
button:hover{background:#083b86}
.special-label { display: flex; align-items: center; cursor: pointer; color: #123; font-weight: bold; }
.special-label input { width: auto; margin-left: 8px; }
table{width:100%;border-collapse:collapse;margin-top:15px; display: block; overflow-x: auto; white-space: nowrap;}
td,th{border:1px solid #dbe7ff;padding:12px;text-align:center}
th{background:#0b4fb3;color:#fff}
#details{text-align:center;color:#0b4fb3;font-weight:bold;margin-top:10px}
.footer{text-align:right;margin-top:22px;padding-top:15px;border-top:1px solid #e5eefc;line-height:1.9}.footer a{color:#0b4fb3;text-decoration:none;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<div class="box">
<div class="brand">
    <img src="logo.jpg" alt="Praxi Logo">
    <div class="sub">حاسبة ضريبة كسب العمل</div>
</div>

<div class="input-row">
    <input id="salary" type="number" placeholder="أدخل الراتب الشهري (الإجمالي)">
    <span class="or-text">أو</span>
    <input id="netInput" type="number" placeholder="أدخل الصافي المطلوب">
</div>

<div class="input-row">
    <input id="allowances" type="number" placeholder="أدخل البدلات الشهرية">
    <label class="special-label"><input id="specialNeeds" type="checkbox"> ضريبة ذوي الهمم</label>
</div>

<div class="input-row">
    <button onclick="calcTax()">احسب من الإجمالي</button>
    <button onclick="calcGrossFromNet()">احسب الإجمالي من الصافي</button>
</div>

<table>
<tr><th>إجمالي الراتب</th><th>البدلات المعتمدة</th><th>الأجر التأميني</th><th>تأمينات 11%</th><th>الإعفاء الشخصي</th><th>الضريبة الشهرية</th><th>الصافي الشهري</th></tr>
<tr><td id="outSalary">-</td><td id="outAllow">-</td><td id="outInsBase">-</td><td id="outInsVal">-</td><td id="outEx">-</td><td id="outMonth">-</td><td id="outNet">-</td></tr>
</table>
<p id="details"></p>
<div class="footer">من تنفيذ إستشاري شئون العاملين والمرتبات / لبيب ميشيل<br><a href="https://linktr.ee/labeebmeshel" target="_blank" rel="noopener noreferrer">تواصل معي</a></div>
</div>

<script>
function tax(i){if(i<=40000)return 0; if(i<=55000)return (i-40000)*0.10; if(i<=70000)return (i-55000)*0.15+1500; if(i<=200000)return (i-70000)*0.20+3750; if(i<=400000)return (i-200000)*0.225+29750; if(i<=600000)return (i-400000)*0.25+74750; if(i<=1200000){let extra=0; if(i>=900001)extra=15250; else if(i>=800001)extra=10250; else if(i>=700001)extra=6750; else if(i>=600001)extra=4000; return (i-400000)*0.25+74750+extra;} return ((i-1200000)*0.275)+300000;}

function calcValues(totalSalary){
    const inputAllow = Number(document.getElementById('allowances').value || 0);
    let insBase = totalSalary;
    let finalAllow = 0;

    if (inputAllow > 0) {
        // المعادلة بناءً على منطق الـ Excel الخاص بك (Total / 1.30)
        insBase = totalSalary / 1.30;
        
        // تطبيق الحدود الدنيا والقصوى للأجر التأميني
        if(insBase < 2700) insBase = 2700;
        if(insBase > 16700) insBase = 16700;

        // البدلات المعتمدة هي الفرق بين الإجمالي والتأميني (بحد أقصى 30% من التأميني)
        finalAllow = totalSalary - insBase;
        
        // التأكد أن البدلات المعتمدة لا تتجاوز القيمة التي أدخلها المستخدم فعلياً
        if (finalAllow > inputAllow) {
            finalAllow = inputAllow;
            insBase = totalSalary - finalAllow;
        }
    }

    const insVal = insBase * 0.11;
    const yearlyIncome = (totalSalary - insVal) * 12;
    const exemption = document.getElementById('specialNeeds').checked ? 30000 : 20000;
    const taxable = Math.max(0, yearlyIncome - exemption);
    const yearlyTax = tax(taxable);
    const monthlyTax = yearlyTax / 12;
    const net = totalSalary - insVal - monthlyTax;

    return {totalSalary, finalAllow, insBase, insVal, exemption, monthlyTax, net};
}

function calcTax(){
    const salary = Number(document.getElementById('salary').value || 0);
    const r = calcValues(salary);
    document.getElementById('outSalary').textContent = r.totalSalary.toFixed(2);
    document.getElementById('outAllow').textContent = r.finalAllow.toFixed(2);
    document.getElementById('outInsBase').textContent = r.insBase.toFixed(2);
    document.getElementById('outInsVal').textContent = r.insVal.toFixed(2);
    document.getElementById('outEx').textContent = r.exemption;
    document.getElementById('outMonth').textContent = r.monthlyTax.toFixed(2);
    document.getElementById('outNet').textContent = r.net.toFixed(2);
    document.getElementById('details').textContent = 'تم الحساب بدقة وفقاً للأجر التأميني';
}

function calcGrossFromNet(){
    const target = Number(document.getElementById('netInput').value || 0);
    if(!target) return;
    let low = 0, high = 2000000, mid = 0;
    for(let i=0; i<60; i++){
        mid = (low + high) / 2;
        const r = calcValues(mid);
        if(r.net < target) low = mid;
        else high = mid;
    }
    document.getElementById('salary').value = mid.toFixed(2);
    calcTax();
}
</script>
</body>
</html>
